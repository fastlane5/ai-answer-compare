<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI 답변 비교</title>
<script>document.title = "AI 답변 비교";</script>

<!-- OneTab, 검색엔진용 메타 정보 -->
<meta name="application-name" content="AI 답변 비교" />
<meta name="apple-mobile-web-app-title" content="AI 답변 비교" />
<meta name="theme-color" content="#1e293b" />
<meta property="og:title" content="AI 답변 비교" />
<meta property="og:site_name" content="AI 답변 비교" />
<meta name="description" content="여러 AI의 답변을 탭으로 비교하고 PDF/TXT로 저장하는 도구">

<!-- 파비콘 강제 지정 -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📝</text></svg>">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
.custom-scrollbar::-webkit-scrollbar{width:6px;height:6px}
.custom-scrollbar::-webkit-scrollbar-track{background:transparent}
.custom-scrollbar::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
.custom-scrollbar::-webkit-scrollbar-thumb:hover{background:#94a3b8}

/* 웹 미리보기 마크다운 스타일 및 표(Table) 최적화 */
.markdown-body h1{font-size:2em;font-weight:bold;margin-bottom:.5em;border-bottom:1px solid #e5e7eb;padding-bottom:.2em}
.markdown-body h2{font-size:1.5em;font-weight:bold;margin-bottom:.5em;border-bottom:1px solid #e5e7eb;padding-bottom:.2em}
.markdown-body h3{font-size:1.25em;font-weight:bold;margin-bottom:.5em}
.markdown-body p{margin-bottom:1em;word-break:keep-all;overflow-wrap:break-word}
.markdown-body ul{list-style:disc;margin-left:1.5em;margin-bottom:1em}
.markdown-body ol{list-style:decimal;margin-left:1.5em;margin-bottom:1em}
.markdown-body blockquote{border-left:4px solid #d1d5db;padding-left:1em;color:#4b5563;margin-bottom:1em;background:#f9fafb;padding:.5em 1em}
.markdown-body code{background:#f3f4f6;padding:.2em.4em;border-radius:3px;font-family:monospace;color:#ef4444;font-size:.9em}
.markdown-body pre{background:#1f2937;color:#f9fafb;padding:1em;border-radius:8px;overflow-x:auto;margin-bottom:1em;white-space:pre-wrap}
.markdown-body table{width:100%;border-collapse:collapse;margin-bottom:1rem;font-size:0.95em}
.markdown-body th,.markdown-body td{border:1px solid #e5e7eb;padding:8px 12px;text-align:left}
.markdown-body th{background-color:#f3f4f6;font-weight:bold}
</style>
</head>
<body class="bg-gray-800 min-h-screen flex items-center justify-center print:bg-white transition-colors duration-300">
<div id="app" class="flex flex-col bg-gray-50 font-sans w-full h-screen overflow-hidden relative transition-all duration-500">

  <!-- 1. 상단 글로벌 컨트롤 패널 -->
  <div class="bg-white border-b shadow-sm p-2 sm:p-3 flex flex-col sm:flex-row sm:flex-wrap items-start sm:items-center gap-2 sm:gap-4 z-10 w-full">
    <div class="flex items-center justify-between w-full sm:w-auto">
      <div class="flex flex-col">
        <h1 class="text-lg sm:text-xl font-bold text-gray-800">AI 답변 비교</h1>
        <!-- 정상가치 제작 표시 및 브런치 / 블로그 하이퍼링크 -->
        <div class="text- sm:text-xs text-gray-500 flex items-center gap-2 mt-0.5">
          <span class="font-medium text-gray-700 bg-gray-100 px-1.5 py-0.5 rounded">정상가치 제작</span>
          <a href="https://brunch.co.kr/@fastlane2" target="_blank" rel="noopener noreferrer" class="hover:text-blue-600 hover:underline flex items-center gap-0.5">
            <svg class="w-3 h-3" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
            브런치
          </a>
          <span class="text-gray-300">|</span>
          <a href="https://blog.naver.com/richwriting" target="_blank" rel="noopener noreferrer" class="hover:text-green-600 hover:underline flex items-center gap-0.5">
            <svg class="w-3 h-3" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11.5 21H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h18a2 2 0 0 1 2 2v10.5"></path><path d="m15.5 18 2.5 5-5"></path><path d="M12 11h.01"></path><path d="M16 11h.01"></path><path d="M8 11h.01"></path></svg>
            블로그
          </a>
        </div>
      </div>
      <button id="btnView" class="hidden sm:flex items-center gap-1.5 px-3 py-1.5 bg-gray-100 hover:bg-gray-200 rounded-full border text-sm ml-4" aria-label="모바일 보기 전환">
        <i data-lucide="smartphone" class="w-4 h-4"></i>
        <span id="viewText">모바일 가로보기</span>
      </button>
    </div>
    <div class="flex items-center gap-2 sm:gap-4 overflow-x-auto w-full sm:w-auto pb-1 sm:pb-0 custom-scrollbar">
      <div class="flex items-center gap-1 flex-shrink-0 sm:border-l sm:pl-4">
        <label class="text-xs font-semibold">글꼴:</label>
        <select id="fontSel" class="border rounded p-1 w-28 text-xs outline-none focus:border-blue-500"></select>
      </div>
      <div class="flex items-center gap-1 flex-shrink-0 sm:border-l sm:pl-4">
        <label class="text-xs font-semibold whitespace-nowrap">본문 크기:</label>
        <input id="fontSize" type="number" min="10" max="40" class="border rounded w-14 text-center text-xs p-1 outline-none">
      </div>
      <div class="flex items-center gap-1 flex-shrink-0 sm:border-l sm:pl-4">
        <label class="text-xs sm:text-sm font-semibold text-gray-700 whitespace-nowrap">줄간격:</label>
        <select id="lineSel" class="border rounded w-16 text-xs p-1 outline-none"></select>
      </div>
      <div class="flex items-center gap-1 flex-shrink-0 sm:border-l sm:pl-4">
        <label class="text-xs font-semibold">탭 크기:</label>
        <input id="tabSize" type="number" min="10" max="24" class="border rounded w-14 text-center text-xs p-1 outline-none">
      </div>
    </div>
    <div class="hidden sm:block flex-1 text-right text-xs text-gray-400">
      단축키: <kbd class="bg-gray-100 border p-0.5 rounded">Ctrl</kbd>+<kbd class="bg-gray-100 border p-0.5 rounded">Alt</kbd>+◀/▶
    </div>
  </div>

  <!-- 2. 탭 네비게이션 영역 -->
  <div id="tabBar" class="flex overflow-x-auto bg-gray-100 border-b custom-scrollbar items-end pt-2 px-2"></div>

  <!-- 3. 현재 탭 조작 도구 바 -->
  <div class="bg-white border-b px-2 sm:px-4 py-2 flex items-center justify-between shadow-sm z-10 overflow-x-auto gap-3 custom-scrollbar">
    <div class="flex items-center gap-1 flex-shrink-0">
      <button id="moveL" class="p-1.5 border rounded hover:bg-gray-100" aria-label="왼쪽으로 이동"><i data-lucide="arrow-left" class="w-3.5 h-3.5"></i></button>
      <button id="moveR" class="p-1.5 border rounded hover:bg-gray-100" aria-label="오른쪽으로 이동"><i data-lucide="arrow-right" class="w-3.5 h-3.5"></i></button>
      <div class="w-px h-4 bg-gray-300 mx-1"></div>
      <button id="rename" class="flex items-center gap-1 px-2 py-1 border rounded hover:bg-gray-100 text-xs" aria-label="탭 이름 변경"><i data-lucide="edit-2" class="w-3 h-3"></i><span class="hidden sm:inline">이름 변경</span></button>
      <button id="delTab" class="flex items-center gap-1 px-2 py-1 border rounded text-red-500 hover:bg-red-50 text-xs" aria-label="탭 삭제"><i data-lucide="trash-2" class="w-3 h-3"></i><span class="hidden sm:inline">탭 삭제</span></button>
    </div>
    <div class="flex items-center gap-1.5 flex-shrink-0">
      <button id="previewBtn" class="flex items-center gap-1 px-3 py-1.5 rounded font-medium text-xs border"></button>

      <!-- PDF 저장 그룹 -->
      <div class="flex items-center gap-1 sm:border-l sm:pl-3">
        <button id="pdfCur" class="flex items-center gap-1 px-2 py-1 sm:py-1.5 bg-green-50 text-green-700 border border-green-200 rounded text-xs" title="현재 탭 PDF 저장"><i data-lucide="file-down" class="w-3.5 h-3.5"></i><span class="hidden sm:inline">현재 PDF</span></button>
        <button id="pdfAll" class="flex items-center gap-1 px-2 py-1.5 bg-green-100 text-green-800 border border-green-300 rounded text-xs font-semibold" title="전체 통합 PDF 저장"><i data-lucide="file-down" class="w-3.5 h-3.5"></i><span class="hidden sm:inline">통합 PDF</span></button>
        <button id="pdfEach" class="flex items-center gap-1 px-2 py-1.5 bg-green-600 text-white rounded text-xs font-semibold" title="전체 개별 PDF 저장"><i data-lucide="file-down" class="w-3.5 h-3.5"></i><span class="hidden sm:inline">개별 PDF</span></button>
      </div>

      <!-- TXT 저장 그룹 -->
      <div class="flex items-center gap-1 sm:border-l sm:pl-3">
        <button id="txtCur" class="flex items-center gap-1 px-2 py-1 bg-blue-50 text-blue-600 border border-blue-200 rounded text-xs" title="현재 탭 TXT 저장"><i data-lucide="download" class="w-3.5 h-3.5"></i><span class="hidden sm:inline">현재 TXT</span></button>
        <button id="txtAll" class="flex items-center gap-1 px-2 py-1.5 bg-blue-100 text-blue-800 border border-blue-300 rounded text-xs font-semibold" title="전체 통합 TXT 저장"><i data-lucide="file-text" class="w-3.5 h-3.5"></i><span class="hidden sm:inline">통합 TXT</span></button>
        <button id="txtEach" class="flex items-center gap-1 px-2 py-1.5 bg-blue-600 text-white rounded text-xs font-semibold" title="전체 개별 TXT 저장"><i data-lucide="files" class="w-3.5 h-3.5"></i><span class="hidden sm:inline">개별 TXT</span></button>
      </div>
    </div>
  </div>

  <!-- 3.5. 에디터 바로 상단 상태 정보 및 삭제 도구 바 -->
  <div class="bg-gray-100 border-b px-3 sm:px-4 py-1.5 flex flex-col sm:flex-row sm:items-center justify-between text-xs gap-2 select-none">
    <div class="flex items-center gap-2 flex-wrap">
      <i data-lucide="save" class="w-3.5 h-3.5 text-gray-500"></i><span class="font-semibold">접두사:</span><strong id="preLabel" class="bg-white border px-2 py-0.5 rounded shadow-sm"></strong>
      <button id="setPre" class="px-2 py-0.5 bg-white hover:bg-gray-50 border rounded flex items-center gap-1"><i data-lucide="edit-2" class="w-3 h-3"></i>설정</button>
      <span id="expName" class="text-gray-500 hidden md:inline ml-2"></span>
    </div>
    <div class="flex items-center justify-between sm:justify-end gap-3 flex-wrap">
      <span id="cnt" class="font-medium"></span>
      <div class="hidden sm:block w-px h-4 bg-gray-300"></div>
      <div class="flex items-center gap-1.5">
        <button id="clearCur" class="px-2 py-1 text-red-600 border border-red-200 rounded bg-white hover:bg-red-50 font-medium">현재 탭 비우기</button>
        <button id="clearAll" class="px-2 py-1 bg-red-600 text-white rounded hover:bg-red-700 font-medium shadow-sm">전체 삭제</button>
      </div>
    </div>
  </div>

  <!-- 4. 에디터 및 마크다운 렌더링 영역 -->
  <div class="flex-1 bg-white relative flex flex-col p-2 sm:p-4 shadow-inner overflow-hidden">
    <textarea id="editor" class="flex-1 w-full h-full resize-none outline-none custom-scrollbar p-2 min-h-" placeholder="답변을 입력하세요... (내용은 자동 저장됩니다)"></textarea>
    <div id="preview" class="flex-1 w-full h-full overflow-y-auto custom-scrollbar p-2 markdown-body text-gray-800 hidden"></div>
  </div>
</div>

<!-- === 팝업 모달창 목록 === -->
<div id="preModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden items-center justify-center z-[5000] p-4">
  <div class="bg-white p-6 rounded-xl w-full max-w-sm shadow-2xl">
    <h2 class="font-bold mb-3 text-lg text-gray-800">파일명 접두사 설정</h2>
    <input id="preInput" class="w-full border rounded-lg p-3 mb-4 outline-none focus:ring-2 focus:ring-blue-500" placeholder="예: 0705">
    <div class="flex gap-2">
      <button id="preCancel" class="w-1/3 bg-gray-200 hover:bg-gray-300 rounded-lg py-3 font-semibold text-gray-700">취소</button>
      <button id="preOk" class="w-2/3 bg-blue-600 hover:bg-blue-700 text-white rounded-lg py-3 font-semibold">확인</button>
    </div>
  </div>
</div>

<div id="msgModal" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden items-center justify-center z-[5000] p-4">
  <div class="bg-white p-6 rounded-xl w-full max-w-sm text-center shadow-2xl">
    <div class="w-12 h-12 bg-blue-100 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-3"><i data-lucide="alert-circle" class="w-6 h-6"></i></div>
    <h2 id="msgT" class="font-bold mb-2 text-lg text-gray-800"></h2>
    <p id="msgM" class="text-gray-600 mb-6"></p>
    <button id="msgOk" class="bg-blue-600 hover:bg-blue-700 text-white w-full rounded-lg py-2.5 font-semibold">닫기</button>
  </div>
</div>

<div id="pdfModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden flex-col items-center justify-center z-[9999] p-4">
  <div class="bg-white p-6 rounded-2xl text-center max-w-sm w-full shadow-2xl">
    <div class="w-12 h-12 border-4 border-green-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
    <h3 class="font-bold text-lg text-gray-800">PDF 파일 작성 중</h3>
    <p id="pdfTxt" class="text-sm text-gray-600 whitespace-pre-line mt-1"></p>
  </div>
</div>

<script>
// 전역 설정 상수 목록
const TAB_NAMES = ["제미나이pro","제미나이3.5","챗GPT","클로드","퍼플렉서티","라마4","그록4","META"];
const FONTS = ["sans-serif","Malgun Gothic","Apple SD Gothic Neo","Noto Sans KR","serif","monospace"];
const LINES = ["1.00","1.15","1.25","1.50","1.75","2.00","2.50","3.00"];

// 데이터 정제 유틸리티
const sanitize = s => s.replace(/[\\/:*?"<>|]/g,'_').trim().slice(0,80) || 'untitled';
const esc = s => String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));

// 메인 상태 정보 객체
let state = {
  prefix: localStorage.getItem('yt-script-prefix') || '',
  tabs: [],
  activeId: '',
  settings: JSON.parse(localStorage.getItem('yt-script-settings') || '{"fontFamily":"sans-serif","fontSize":16,"tabFontSize":14,"lineSpacing":1.5}'),
  isPreview: false,
  isMobile: false,
  editingId: null
};

// 로컬 데이터 수합 및 예외 백업 복구
try {
  const saved = localStorage.getItem('yt-script-tabs');
  if (saved) {
    state.tabs = JSON.parse(saved);
    state.activeId = state.tabs[0]?.id || '';
  } else {
    state.tabs = TAB_NAMES.map((n, i) => ({ id: `tab-${i}`, title: n, content: '' }));
    state.activeId = state.tabs[0].id;
  }
} catch {
  state.tabs = TAB_NAMES.map((n, i) => ({ id: `tab-${i}`, title: n, content: '' }));
  state.activeId = state.tabs[0].id;
}

const $ = id => document.getElementById(id);

// 성능 최적화용 Debounce 디바운스 자동 저장 타이머 + 용량 체크
let timer = null;
const save = () => {
  clearTimeout(timer);
  timer = setTimeout(() => {
    try {
      const data = JSON.stringify(state.tabs);
      if (data.length > 4500000) { // 4.5MB 제한
        msg('저장 공간 부족', '내용이 너무 많아요. 일부 탭을 삭제해주세요.');
        return;
      }
      localStorage.setItem('yt-script-tabs', data);
      localStorage.setItem('yt-script-settings', JSON.stringify(state.settings));
      localStorage.setItem('yt-script-prefix', state.prefix);
    } catch (e) {
      msg('저장 실패', '브라우저 저장 공간이 부족합니다.');
    }
  }, 400);
};

// UI 상태 그리기
function render() {
  const active = state.tabs.find(t => t.id === state.activeId);

  // 1. 설정 셀렉트 및 폼 바인딩
  $('fontSel').innerHTML = FONTS.map(f => `<option value="${f}" ${state.settings.fontFamily === f? 'selected' : ''}>${f}</option>`).join('');
  $('lineSel').innerHTML = LINES.map(l => `<option value="${l}" ${String(state.settings.lineSpacing) === l? 'selected' : ''}>${l}</option>`).join('');
  $('fontSize').value = state.settings.fontSize;
  $('tabSize').value = state.settings.tabFontSize;
  $('preLabel').textContent = state.prefix || '(없음)';

  // 2. 글자수 및 단어수 연산 표시
  if (active) {
    const charCount = active.content.replace(/\n+$/, '').length;
    const charNoSpace = active.content.replace(/\s/g, '').length;
    const wordCount = active.content.trim()? active.content.trim().split(/\s+/).length : 0;

    $('expName').textContent = `👉 예상 파일명: ${state.prefix? sanitize(state.prefix) + '-' : ''}${sanitize(active.title)}.txt`;
    $('cnt').innerHTML = `글자수: <strong class="text-blue-600">${charCount}</strong> <span class="text-gray-400">(${charNoSpace})</span> | 단어수: <strong class="text-indigo-600">${wordCount}</strong>`;
  } else {
    $('expName').textContent = '';
    $('cnt').innerHTML = '';
  }

  // 3. 탭 바인딩 및 그리기
  $('tabBar').innerHTML = state.tabs.map(t => {
    const isA = t.id === state.activeId;
    if (state.editingId === t.id) {
      return `
        <div class="relative flex-shrink-0 group">
          <div class="flex items-center bg-white border-t border-l border-r rounded-t-lg mx-0.5 px-2 sm:px-3 py-1.5 sm:py-2 z-10 relative">
            <input id="renameInput" type="text" value="${esc(t.title)}" class="border border-blue-400 rounded px-2 py-0.5 sm:py-1 outline-none text-xs sm:text-sm w-24 sm:w-32" />
            <button id="saveRenameBtn" class="ml-1 text-green-600 hover:bg-green-50 p-1 rounded" aria-label="저장">
              <svg class="w-3.5 h-3.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </button>
            <button id="cancelRenameBtn" class="text-red-500 hover:bg-red-50 p-1 rounded" aria-label="취소">
              <svg class="w-3.5 h-3.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
          </div>
        </div>
      `;
    }
    return `
      <div class="relative flex-shrink-0 group">
        <button data-id="${t.id}" class="tabBtn px-3 sm:px-4 py-1.5 sm:py-2 mx-0.5 rounded-t-lg border-t border-l border-r font-semibold whitespace-nowrap ${isA? 'bg-white border-gray-300 text-blue-600 shadow-[0_2px_0_0_white]' : 'bg-gray-200 border-transparent text-gray-500 hover:bg-gray-300'}" style="font-size:${state.settings.tabFontSize}px">
          ${esc(t.title)}${t.content.trim()? '<span class="ml-1.5 sm:ml-2 inline-block w-2 h-2 bg-green-400 rounded-full"></span>' : ''}
        </button>
      </div>`;
  }).join('') + `<button id="addTab" class="px-3 py-1.5 bg-gray-200 hover:bg-gray-300 rounded-t-lg font-bold ml-1" aria-label="새 탭 추가">+</button>`;

  // 동적 생성된 탭 바인딩 직후 포커스 처리
  if (state.editingId) {
    const input = $('renameInput');
    if (input) {
      input.focus();
      input.select();
      input.onkeydown = e => {
        if (e.key === 'Enter') finishRename(input.value);
        if (e.key === 'Escape') cancelRename();
      };
      $('saveRenameBtn').onclick = () => finishRename(input.value);
      $('cancelRenameBtn').onclick = cancelRename;
    }
  }

  // 4. 에디터 폰트 속성 부여
  const ed = $('editor'), pv = $('preview');
  if (active) {
    ed.style.fontFamily = `'${state.settings.fontFamily}', sans-serif`;
    pv.style.fontFamily = `'${state.settings.fontFamily}', sans-serif`;
    ed.style.fontSize = state.settings.fontSize + 'px';
    pv.style.fontSize = state.settings.fontSize + 'px';
    ed.style.lineHeight = state.settings.lineSpacing;
    pv.style.lineHeight = state.settings.lineSpacing;
    ed.value = active.content;

    if (state.isPreview) {
      ed.classList.add('hidden');
      pv.classList.remove('hidden');
      // DOMPurify로 XSS 방지
      const rawHtml = window.marked? marked.parse(active.content || '내용이 없습니다.') : esc(active.content);
      pv.innerHTML = window.DOMPurify? DOMPurify.sanitize(rawHtml) : rawHtml;
    } else {
      pv.classList.add('hidden');
      ed.classList.remove('hidden');
      ed.placeholder = `${active.title} 답변을 입력하세요...\n(내용은 브라우저에 자동 저장됩니다)`;
    }
  }

  // 5. 토글 버튼 마크업 갱신
  $('previewBtn').innerHTML = state.isPreview? `<i data-lucide="code" class="w-3.5 h-3.5"></i> 편집 모드` : `<i data-lucide="eye" class="w-3.5 h-3.5"></i> 미리보기`;
  $('previewBtn').className = state.isPreview? 'flex items-center gap-1 px-3 py-1.5 rounded bg-indigo-600 text-white text-xs font-medium' : 'flex items-center gap-1 px-3 py-1.5 rounded bg-indigo-50 text-indigo-700 border border-indigo-200 text-xs font-medium';
  $('viewText').textContent = state.isMobile? 'PC 보기' : '모바일 가로보기';

  // 가로 스마트폰 목업 스케일 및 클래스 바인딩
  $('app').className = `flex flex-col bg-gray-50 font-sans overflow-hidden relative transition-all duration-500 ${state.isMobile? 'w-full max-w- h- shadow-2xl sm:rounded- sm:border- sm:border-black' : 'w-full h-screen'}`;

  // Lucide 아이콘 재생성
  lucide.createIcons();
}

function msg(t, m) {
  $('msgT').textContent = t;
  $('msgM').textContent = m;
  $('msgModal').classList.remove('hidden');
  $('msgModal').classList.add('flex');
  lucide.createIcons();
}

function dl(name, content) {
  const b = new Blob([content], { type: 'text/plain;charset=utf-8' });
  const u = URL.createObjectURL(b);
  const a = document.createElement('a');
  a.href = u;
  a.download = sanitize(name);
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(u);
}

// PDF 다이렉트 컨버터 엔진
async function genPdf(title, content, file) {
  if (!window.html2pdf ||!window.marked) {
    msg('오류', 'PDF 라이브러리를 준비하지 못했습니다. 새로고침을 해주세요.');
    return;
  }

  const safeTitle = esc(title);
  const safePrefix = esc(state.prefix);
  const htmlContent = window.marked.parse(content || '*내용 없음*');
  const sanitizedHtml = window.DOMPurify? DOMPurify.sanitize(htmlContent) : htmlContent;

  // PDF 전용 독립 정밀 렌더링 스타일
  const pdfStyle = `
    <style>
     .pdf-box { padding:40px; font-family:'${state.settings.fontFamily}', sans-serif; font-size:${state.settings.fontSize}px; line-height:${state.settings.lineSpacing}; background:white; color:#1f2937; word-break:keep-all; overflow-wrap:break-word; }

     .pdf-md p,.pdf-md li,.pdf-md blockquote,.pdf-md pre,.pdf-md tr,.pdf-md h1,.pdf-md h2,.pdf-md h3,.pdf-md figure {
        page-break-inside: avoid!important;
        break-inside: avoid!important;
      }

     .pdf-md h1{font-size:2em; font-weight:bold; margin:1.5rem 0 1rem; border-bottom:3px solid #111; padding-bottom:0.4rem;}
     .pdf-md h2{font-size:1.6em; font-weight:bold; margin:1.2rem 0 0.8rem; border-bottom:1px solid #e5e7eb; padding-bottom:0.3rem;}
     .pdf-md h3{font-size:1.3em; font-weight:bold; margin:1rem 0 0.6rem;}
     .pdf-md p{margin-bottom:1rem;}
     .pdf-md ul{list-style:disc; margin-left:1.5rem; margin-bottom:1rem;}
     .pdf-md ol{list-style:decimal; margin-left:1.5rem; margin-bottom:1rem;}
     .pdf-md blockquote{border-left:4px solid #d1d5db; padding:0.5rem 1rem; background:#f9fafb; margin-bottom:1rem;}
     .pdf-md pre{background:#1f2937; color:#f9fafb; padding:1rem; border-radius:8px; white-space:pre-wrap; word-break:break-all;}
     .pdf-md code{background:#f3f4f6; padding:0.2rem 0.4rem; border-radius:4px; color:#ef4444;}

     .pdf-md table { width: 100%; border-collapse: collapse; margin-bottom: 1.5rem; page-break-inside: auto; }
     .pdf-md tr { page-break-inside: avoid!important; break-inside: avoid!important; }
     .pdf-md th,.pdf-md td { border: 1px solid #cbd5e1; padding: 10px 14px; text-align: left; font-size: 0.9em; word-break: keep-all; }
     .pdf-md th { background-color: #f1f5f9; font-weight: bold; }
    </style>
  `;

  const htmlString = `
    ${pdfStyle}
    <div class="pdf-box">
      <div style="text-align:center; border-bottom:4px solid #1f2937; padding-bottom:1rem; margin-bottom:2rem">
        <h1 style="font-size:28px; font-weight:800; margin:0; color:#111827">${safeTitle}</h1>
        ${safePrefix? `<p style="color:#6b7280; margin-top:8px">프로젝트 접두사: ${safePrefix}</p>` : ''}
      </div>
      <div class="pdf-md">${sanitizedHtml}</div>
    </div>
  `;

  const opt = {
    margin: 12,
    filename: sanitize(file),
    image: { type: 'jpeg', quality:.98 },
    html2canvas: { scale: 2, useCORS: true, logging: false },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
    pagebreak: { mode: ['css', 'legacy'] }
  };

  try {
    await html2pdf().from(htmlString).set(opt).save();
  } catch (err) {
    console.error(err);
    msg('오류', 'PDF 파일 빌드 중 에러가 발생했습니다.');
  }
}

// 탭 이름 변경 제어 핸들러
function finishRename(newTitle) {
  if (!newTitle.trim()) { cancelRename(); return; }
  state.tabs = state.tabs.map(t => t.id === state.editingId? {...t, title: newTitle.trim() } : t);
  state.editingId = null;
  save();
  render();
}

function cancelRename() {
  state.editingId = null;
  render();
}

// === 이벤트 핸들러 ===
document.addEventListener('click', e => {
  const b = e.target.closest('.tabBtn');
  if (b) {
    state.activeId = b.dataset.id;
    render();
    return;
  }
  if (e.target.id === 'addTab') {
    const id = `tab-${Date.now()}`; state.tabs.push({id,title:'새 탭',content:''}); state.activeId = id; save(); render();
  }
});
