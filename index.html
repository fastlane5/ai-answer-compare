<!-- 💡 5. 구형 서비스 워커 및 구형 캐시 강제 삭제 스크립트 -->
<script>
  if ('serviceWorker' in navigator) {
    try {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for(let registration of registrations) {
          registration.unregister().catch(function(e) { console.log(e); });
        }
      }).catch(function(e) { console.log(e); });
    } catch(e) { console.log(e); }
  }
  if (window.caches) {
    try {
      caches.keys().then(function(names) {
        for (let name of names) {
          caches.delete(name).catch(function(e) { console.log(e); });
        }
      }).catch(function(e) { console.log(e); });
    } catch(e) { console.log(e); }
  }
</script>

  <div id="mainWorkspace" class="flex-1 relative flex flex-col md:flex-row shadow-inner overflow-hidden bg-gray-300 gap-[1px]">
    
    <!-- 왼쪽 메인 창 -->
    <div id="leftPane" class="flex-1 bg-white relative flex flex-col p-2 sm:p-4 overflow-hidden w-full h-full">

<script>
document.title = "AI 답변 비교";

const TAB_NAMES = ["제미나이pro","제미나이3.5","챗GPT","클로드","퍼플렉서티","라마4","그록4","META"];
const STANDARD_FONTS = [
  "Pretendard", "Noto Sans KR", "GmarketSansMedium", "KyoboHandwriting2019", 
  "MaplestoryBold", "CookieRun-Regular", "Nanum Gothic", "Nanum Myeongjo", 
  "D2Coding", "Gowun Dodum", "Gowun Batang", "Nanum Pen Script", 
  "sans-serif", "serif", "monospace"
];
const LINES = ["1.00","1.15","1.25","1.50","1.75","2.00","2.50","3.00"];

const sanitize = s => s.replace(/[\\/:*?"<>|]/g,'_').trim().slice(0,80) || 'untitled';
const esc = s => String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));

const cleanUrl = url => {
  if (!url) return '';
  let target = url.trim();
  if (target.includes('](')) {
    const matches = target.match(/\((https?:\/\/[^\)]+)\)/i);
    if (matches && matches[1]) return matches[1].trim();
  }
  return target.replace(/[\[\]\(\)]/g, '').trim();
};

function isFontAvailable(fontName) {
  if (!fontName) return false;
  if (['sans-serif', 'serif', 'monospace', 'Malgun Gothic', 'Apple SD Gothic Neo'].includes(fontName)) return true;
  try {
    const canvas = document.createElement("canvas");
    const context = canvas.getContext("2d");
    if (!context) return false;
    const text = "abcdefghijklmnopqrstuvwxyz0123456789한글테스트";
    context.font = "72px monospace";
    const monoWidth = context.measureText(text).width;
    context.font = "72px sans-serif";
    const sansWidth = context.measureText(text).width;
    context.font = `72px "${fontName}", monospace`;
    const testMonoWidth = context.measureText(text).width;
    context.font = `72px "${fontName}", sans-serif`;
    const testSansWidth = context.measureText(text).width;
    return (testMonoWidth !== monoWidth || testSansWidth !== sansWidth);
  } catch (e) { return false; }
}

function loadCustomFont(name, url) {
  if (!url) return;
  const clean = cleanUrl(url);
  const isDirectFontFile = /\.(woff2?|ttf|otf|eot)(\?.*)?$/i.test(clean);
  if (isDirectFontFile) {
    const styleId = `font-style-${name}`;
    let styleEl = document.getElementById(styleId);
    if (!styleEl) {
      styleEl = document.createElement('style');
      styleEl.id = styleId;
      document.head.appendChild(styleEl);
    }
    let formatType = 'woff';
    if (clean.toLowerCase().includes('woff2')) formatType = 'woff2';
    else if (clean.toLowerCase().includes('ttf')) formatType = 'truetype';
    else if (clean.toLowerCase().includes('otf')) formatType = 'opentype';
    styleEl.innerHTML = `@font-face { font-family: '${name}'; src: url('${clean}') format('${formatType}'); font-weight: normal; font-style: normal; font-display: swap; }`;
  } else {
    const linkId = `font-link-${name}`;
    let linkEl = document.getElementById(linkId);
    if (!linkEl) {
      linkEl = document.createElement('link');
      linkEl.id = linkId;
      linkEl.rel = 'stylesheet';
      document.head.appendChild(linkEl);
    }
    linkEl.href = clean;
  }
}

let state = {
  prefix: localStorage.getItem('yt-script-prefix') || '',
  tabs: [],
  activeId: '',
  editingId: null,
  isPreview: false,
  isCompareMode: false,
  compareId: null,
  settings: JSON.parse(localStorage.getItem('yt-script-settings') || '{"fontFamily":"Pretendard","fontSize":16,"tabFontSize":14,"lineSpacing":1.5,"uiFontSize":16,"customFonts":[]}')
};

if (!state.settings.uiFontSize) state.settings.uiFontSize = 16;
if (!state.settings.tabFontSize) state.settings.tabFontSize = 14;
if (!state.settings.fontFamily || state.settings.fontFamily === 'sans-serif') state.settings.fontFamily = 'Pretendard';
if (!state.settings.customFonts) state.settings.customFonts = [];

state.settings.customFonts = state.settings.customFonts.map(f => ({ name: f.name, url: cleanUrl(f.url) }));
state.settings.customFonts.forEach(font => loadCustomFont(font.name, font.url));

try {
  const saved = localStorage.getItem('yt-script-tabs');
  if (saved) { 
    state.tabs = JSON.parse(saved); 
    state.activeId = state.tabs[0]?.id || ''; 
  } else { 
    state.tabs = TAB_NAMES.map((n, i) => ({ id: `tab-${i}`, title: n, content: '' })); 
    state.activeId = state.tabs[0].id; 
  }
} catch { 
  state.tabs = TAB_NAMES.map((n, i) => ({ id: `tab-${i}`, title: n, content: '' })); 
  state.activeId = state.tabs[0].id; 
}

const $ = id => document.getElementById(id);
let timer = null; 
const save = () => { 
  clearTimeout(timer); 
  timer = setTimeout(() => { 
    localStorage.setItem('yt-script-tabs', JSON.stringify(state.tabs)); 
    localStorage.setItem('yt-script-settings', JSON.stringify(state.settings)); 
    localStorage.setItem('yt-script-prefix', state.prefix); 
  }, 400); 
};

function msg(title, content) {
  $('msgT').textContent = title;
  $('msgM').textContent = content;
  $('msgModal').classList.remove('hidden');
  $('msgModal').classList.add('flex');
}

$('msgOk').onclick = () => $('msgModal').classList.add('hidden');

let confirmCallback = null;
function customConfirm(title, message, onConfirm) {
  $('confirmT').textContent = title;
  $('confirmM').textContent = message;
  confirmCallback = onConfirm;
  $('confirmModal').classList.remove('hidden');
  $('confirmModal').classList.add('flex');
}

$('confirmCancel').onclick = () => { $('confirmModal').classList.add('hidden'); confirmCallback = null; };
$('confirmOk').onclick = () => { $('confirmModal').classList.add('hidden'); if (confirmCallback) confirmCallback(); confirmCallback = null; };

window.finishRename = id => {
  const input = $('renameInput');
  if (input) {
    const newTitle = input.value.trim();
    if (newTitle) {
      const tab = state.tabs.find(t => t.id === id);
      if (tab) tab.title = newTitle;
    }
  }
  state.editingId = null;
  save(); render();
};

function render() {
  const active = state.tabs.find(t => t.id === state.activeId);
  const uiSizeVal = state.settings.uiFontSize || 16;
  const customFontNames = state.settings.customFonts.map(f => f.name);
  const totalFonts = [...STANDARD_FONTS, ...customFontNames];

  $('fontSel').innerHTML = totalFonts.map(f => `<option value="${f}" ${state.settings.fontFamily === f ? 'selected' : ''}>${f}</option>`).join('');
  $('lineSel').innerHTML = LINES.map(l => `<option value="${l}" ${String(state.settings.lineSpacing) === l ? 'selected' : ''}>${l}</option>`).join('');
  $('fontSize').value = state.settings.fontSize; 
  $('tabSize').value = state.settings.tabFontSize;
  $('uiFontSize').value = uiSizeVal;
  $('preLabel').textContent = state.prefix || '(없음)';
  
  if (state.settings.customFonts.some(f => f.name === state.settings.fontFamily)) {
    $('delFontBtn').classList.remove('hidden');
  } else {
    $('delFontBtn').classList.add('hidden');
  }

  document.documentElement.style.setProperty('--ui-font-size', uiSizeVal + 'px');
  
  const activeFontName = state.settings.fontFamily;
  const statusBadge = $('fontStatusBadge');
  if (statusBadge) {
    statusBadge.className = "px-1.5 py-0.5 rounded text-[10px] font-bold border whitespace-nowrap transition-all";
    if (isFontAvailable(activeFontName)) {
      statusBadge.textContent = "🟢 사용 가능";
      statusBadge.className += " bg-green-50 text-green-700 border-green-200 shadow-sm";
      statusBadge.title = "이 글꼴이 브라우저에 성공적으로 감지 및 반영되었습니다.";
    } else {
      statusBadge.textContent = "🔴 미지원/확인 필요";
      statusBadge.className += " bg-red-50 text-red-700 border-red-200 shadow-sm";
      statusBadge.title = "글꼴 파일이 깨졌거나 PC에 글꼴이 설치되지 않아 기본 글꼴로 대체 렌더링 중입니다.";
    }
  }

  if (active) {
    const charCount = active.content.replace(/\n+$/, '').length;
    const charNoSpace = active.content.replace(/\s/g, '').length;
    const wordCount = active.content.trim() ? active.content.trim().split(/\s+/).length : 0;
    $('expName').textContent = `👉 예상 파일명: ${state.prefix ? sanitize(state.prefix) + '-' : ''}${sanitize(active.title)}.txt`;
    $('cnt').innerHTML = `글자수: <strong class="text-blue-600">${charCount}</strong> <span class="text-gray-400">(${charNoSpace})</span> | 단어수: <strong class="text-indigo-600">${wordCount}</strong>`;
  } else {
    $('expName').textContent = ''; $('cnt').innerHTML = '';
  }

  $('tabBar').innerHTML = state.tabs.map(t => {
    const isA = t.id === state.activeId;
    if (state.editingId === t.id) {
      return `<div class="relative flex-shrink-0 group"><div class="flex items-center bg-white border-t border-l border-r rounded-t-lg mx-0.5 px-2 sm:px-3 py-1.5 sm:py-2 z-10 relative">
        <input id="renameInput" type="text" value="${esc(t.title)}" class="border border-blue-400 rounded px-2 py-0.5 sm:py-1 outline-none w-24 sm:w-32" style="font-size: ${state.settings.tabFontSize}px;" />
        <button id="saveRenameBtn" class="ml-1 text-green-600 hover:bg-green-50 p-1 rounded" onclick="finishRename('${t.id}')">
          <svg class="w-3.5 h-3.5" xmlns="[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </button>
      </div></div>`;
    }
    // 💡 핵심: 탭 항목에 style 속성으로 독립적인 글자 크기 주입
    return `<div class="cursor-pointer px-3 sm:px-4 py-1.5 sm:py-2 whitespace-nowrap transition-all border-t border-l border-r mx-0.5 mt-1 rounded-t-lg select-none flex items-center gap-1.5 ${isA ? 'bg-white border-gray-200 font-bold text-blue-600 shadow-sm z-10 relative border-b-white transform translate-y-[1px]' : 'bg-gray-100/50 text-gray-500 border-transparent hover:bg-gray-200'}" onclick="selectTab('${t.id}')" style="font-size: ${state.settings.tabFontSize}px;">
        ${esc(t.title)}
        ${isA ? '<div class="w-1.5 h-1.5 rounded-full bg-blue-500 shadow-[0_0_4px_rgba(59,130,246,0.6)]"></div>' : ''}
    </div>`;
  }).join('') + `<button onclick="addTab()" class="ml-2 px-2 py-1 bg-gray-200 hover:bg-gray-300 rounded text-gray-600 mb-1 text-xs"><svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg></button>`;

  if (state.editingId) {
    setTimeout(() => {
      const input = $('renameInput');
      if (input) {
        input.focus();
        input.select();
        input.onkeydown = e => { if (e.key === 'Enter') finishRename(state.editingId); };
      }
    }, 50);
  }

  if (active) {
    if (document.activeElement !== $('editor')) $('editor').value = active.content;
    
    // 에디터 적용
    $('editor').style.fontFamily = state.settings.fontFamily;
    $('editor').style.fontSize = state.settings.fontSize + 'px';
    $('editor').style.lineHeight = state.settings.lineSpacing;
    
    // 💡 핵심: 웹 미리보기에도 에디터와 동일하게 폰트, 크기, 줄간격 완벽 동기화
    $('preview').style.fontFamily = state.settings.fontFamily;
    $('preview').style.fontSize = state.settings.fontSize + 'px';
    $('preview').style.lineHeight = state.settings.lineSpacing;

    try {
      $('preview').innerHTML = marked.parse(active.content || '작성된 내용이 없습니다.');
    } catch(e) {
      $('preview').innerHTML = '<p class="text-red-500">마크다운 변환 중 오류가 발생했습니다.</p>';
    }
  } else {
    $('editor').value = '';
    $('preview').innerHTML = '';
  }

  // 💡 비교 모드 렌더링 로직 (오른쪽 패널 활성화)
  if (state.isCompareMode) {
    $('rightPane').classList.remove('hidden');
    $('rightPane').classList.add('flex');
    $('compareBtn').classList.add('bg-indigo-100', 'text-indigo-700', 'border-indigo-300');
    $('compareBtn').classList.remove('bg-white', 'text-gray-700');
    
    // 셀렉트 박스 옵션 업데이트
    $('compareTabSel').innerHTML = state.tabs.map(t => 
      `<option value="${t.id}" ${state.compareId === t.id ? 'selected' : ''}>${esc(t.title)}</option>`
    ).join('');

    const compTab = state.tabs.find(t => t.id === state.compareId);
    if (compTab) {
      if (document.activeElement !== $('compareEditor')) $('compareEditor').value = compTab.content;
      
      $('compareEditor').style.fontFamily = state.settings.fontFamily;
      $('compareEditor').style.fontSize = state.settings.fontSize + 'px';
      $('compareEditor').style.lineHeight = state.settings.lineSpacing;
      
      // 웹 미리보기에도 동기화
      $('comparePreview').style.fontFamily = state.settings.fontFamily;
      $('comparePreview').style.fontSize = state.settings.fontSize + 'px';
      $('comparePreview').style.lineHeight = state.settings.lineSpacing;

      try {
        $('comparePreview').innerHTML = marked.parse(compTab.content || '작성된 내용이 없습니다.');
      } catch(e) {
        $('comparePreview').innerHTML = '<p class="text-red-500">마크다운 변환 중 오류가 발생했습니다.</p>';
      }
    }
  } else {
    $('rightPane').classList.add('hidden');
    $('rightPane').classList.remove('flex');
    $('compareBtn').classList.remove('bg-indigo-100', 'text-indigo-700', 'border-indigo-300');
    $('compareBtn').classList.add('bg-white', 'text-gray-700');
  }

  updatePreviewBtn();
  lucide.createIcons();
}

function updatePreviewBtn() {
  const btn = $('previewBtn');
  if (state.isPreview) {
    btn.innerHTML = `<i data-lucide="edit-3" class="w-3.5 h-3.5"></i> 에디터로 돌아가기`;
    btn.className = "flex items-center gap-1 px-3 py-1.5 rounded font-medium text-xs border bg-blue-600 text-white border-blue-700 hover:bg-blue-700 shadow-sm transition";
    
    $('editor').classList.add('hidden');
    $('preview').classList.remove('hidden');
    if($('compareEditor')) $('compareEditor').classList.add('hidden');
    if($('comparePreview')) $('comparePreview').classList.remove('hidden');
  } else {
    btn.innerHTML = `<i data-lucide="eye" class="w-3.5 h-3.5"></i> 웹 미리보기 모드`;
    btn.className = "flex items-center gap-1 px-3 py-1.5 rounded font-medium text-xs border bg-white text-gray-700 border-gray-300 hover:bg-gray-50 shadow-sm transition";
    
    $('editor').classList.remove('hidden');
    $('preview').classList.add('hidden');
    if($('compareEditor')) $('compareEditor').classList.remove('hidden');
    if($('comparePreview')) $('comparePreview').classList.add('hidden');
  }
}

// 탭 기능
window.selectTab = id => { state.activeId = id; state.editingId = null; render(); };
window.addTab = () => { 
  const id = `tab-${Date.now()}`; 
  state.tabs.push({ id, title: `새 탭 ${state.tabs.length + 1}`, content: '' }); 
  state.activeId = id; save(); render(); 
};

$('rename').onclick = () => {
  if (state.activeId) { state.editingId = state.activeId; render(); }
};

$('delTab').onclick = () => {
  if (state.tabs.length <= 1) return msg('삭제 불가', '최소 1개의 탭은 유지해야 합니다.');
  customConfirm('탭 삭제', '현재 탭을 삭제하시겠습니까?\n삭제된 내용은 복구할 수 없습니다.', () => {
    const idx = state.tabs.findIndex(t => t.id === state.activeId);
    state.tabs.splice(idx, 1);
    state.activeId = state.tabs[Math.min(idx, state.tabs.length - 1)].id;
    
    // 만약 삭제한 탭이 비교모드 우측 탭이었다면 비교 대상을 다른 것으로 재설정
    if (state.compareId === state.activeId) {
      const otherTab = state.tabs.find(t => t.id !== state.activeId);
      state.compareId = otherTab ? otherTab.id : state.activeId;
    }
    save(); render();
  });
};

$('moveL').onclick = () => {
  const i = state.tabs.findIndex(t => t.id === state.activeId);
  if (i > 0) {
    [state.tabs[i-1], state.tabs[i]] = [state.tabs[i], state.tabs[i-1]];
    save(); render();
  }
};
$('moveR').onclick = () => {
  const i = state.tabs.findIndex(t => t.id === state.activeId);
  if (i < state.tabs.length - 1) {
    [state.tabs[i], state.tabs[i+1]] = [state.tabs[i+1], state.tabs[i]];
    save(); render();
  }
};

$('editor').oninput = e => {
  const active = state.tabs.find(t => t.id === state.activeId);
  if (active) { active.content = e.target.value; save(); render(); }
};

// 💡 비교 모드 관련 이벤트 바인딩
$('compareBtn').onclick = () => {
  state.isCompareMode = !state.isCompareMode;
  if (state.isCompareMode && !state.compareId) {
    const other = state.tabs.find(t => t.id !== state.activeId) || state.tabs[0];
    state.compareId = other ? other.id : state.activeId;
  }
  render();
};

$('closeCompareBtn').onclick = () => {
  state.isCompareMode = false;
  render();
};

$('compareTabSel').onchange = e => {
  state.compareId = e.target.value;
  render();
};

$('compareEditor').oninput = e => {
  const compTab = state.tabs.find(t => t.id === state.compareId);
  if (compTab) { compTab.content = e.target.value; save(); render(); }
};

$('previewBtn').onclick = () => { state.isPreview = !state.isPreview; updatePreviewBtn(); };

$('convertCodeBlocks').onclick = () => {
  const active = state.tabs.find(t => t.id === state.activeId);
  if (!active) return;
  const text = active.content;
  if (!text.includes('```')) return msg('알림', '본문에 변환할 코드 블록(```)이 없습니다.');
  
  customConfirm('인용구로 변환', '코드 블록을 블로그/브런치용 인용구(>) 형식으로 모두 변환할까요?', () => {
    let lines = text.split('\n');
    let inBlock = false;
    let newLines = [];
    
    for (let line of lines) {
      if (line.trim().startsWith('```')) {
        inBlock = !inBlock;
        continue;
      }
      if (inBlock) newLines.push('> ' + line);
      else newLines.push(line);
    }
    active.content = newLines.join('\n');
    save(); render();
    msg('완료', '변환이 완료되었습니다.');
  });
};

$('clearCur').onclick = () => {
  customConfirm('비우기', '현재 탭의 내용을 모두 지우시겠습니까?', () => {
    const active = state.tabs.find(t => t.id === state.activeId);
    if (active) { active.content = ''; save(); render(); }
  });
};

$('clearAll').onclick = () => {
  customConfirm('전체 삭제', '모든 탭의 내용을 완전히 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.', () => {
    state.tabs.forEach(t => t.content = '');
    save(); render();
  });
};

// 환경 설정
$('fontSel').onchange = e => { state.settings.fontFamily = e.target.value; save(); render(); };
$('fontSize').oninput = e => { state.settings.fontSize = e.target.value; save(); render(); };
$('uiFontSize').oninput = e => { state.settings.uiFontSize = e.target.value; save(); render(); };
$('lineSel').onchange = e => { state.settings.lineSpacing = e.target.value; save(); render(); };
$('tabSize').oninput = e => { state.settings.tabFontSize = e.target.value; save(); render(); };

// 접두사
$('setPre').onclick = () => { $('preInput').value = state.prefix; $('preModal').classList.remove('hidden'); $('preModal').classList.add('flex'); };
$('preCancel').onclick = () => $('preModal').classList.add('hidden');
$('preOk').onclick = () => { state.prefix = $('preInput').value.trim(); $('preModal').classList.add('hidden'); save(); render(); };

// 글꼴 추가
$('addFontBtn').onclick = () => {
  $('fontNameInput').value = ''; $('fontUrlInput').value = '';
  $('fontModal').classList.remove('hidden'); $('fontModal').classList.add('flex');
};
$('fontCancel').onclick = () => $('fontModal').classList.add('hidden');
$('fontOk').onclick = () => {
  const name = $('fontNameInput').value.trim();
  const url = $('fontUrlInput').value.trim();
  if (!name || !url) return msg('오류', '글꼴 이름과 주소를 모두 입력해주세요.');
  if (state.settings.customFonts.find(f => f.name === name)) return msg('오류', '이미 등록된 이름입니다.');
  
  state.settings.customFonts.push({ name, url: cleanUrl(url) });
  loadCustomFont(name, url);
  state.settings.fontFamily = name;
  $('fontModal').classList.add('hidden');
  save(); render();
  msg('추가 완료', `'${name}' 글꼴이 적용되었습니다.`);
};

document.querySelectorAll('.preset-font-badge').forEach(btn => {
  btn.onclick = () => {
    $('fontNameInput').value = btn.dataset.name;
    $('fontUrlInput').value = btn.dataset.url;
  };
});

$('delFontBtn').onclick = () => {
  const currentFont = state.settings.fontFamily;
  customConfirm('글꼴 삭제', `'${currentFont}' 글꼴을 목록에서 삭제하시겠습니까?`, () => {
    state.settings.customFonts = state.settings.customFonts.filter(f => f.name !== currentFont);
    state.settings.fontFamily = 'Pretendard'; // 기본값 복귀
    save(); render();
  });
};

// 저장 (TXT)
const downloadTxt = (filename, content) => {
  const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
};

$('txtCur').onclick = () => {
  const act = state.tabs.find(t => t.id === state.activeId);
  if (act) downloadTxt(`${state.prefix ? sanitize(state.prefix)+'-' : ''}${sanitize(act.title)}.txt`, act.content);
};
$('txtAll').onclick = () => {
  const content = state.tabs.map(t => `====== ${t.title} ======\n\n${t.content}\n\n`).join('');
  downloadTxt(`${state.prefix ? sanitize(state.prefix)+'-' : ''}전체통합.txt`, content);
};
$('txtEach').onclick = () => {
  state.tabs.forEach((t, i) => {
    setTimeout(() => downloadTxt(`${state.prefix ? sanitize(state.prefix)+'-' : ''}${sanitize(t.title)}.txt`, t.content), i * 300);
  });
};

// 저장 (PDF)
async function generatePDF(content, filename) {
  $('pdfModal').classList.remove('hidden');
  $('pdfModal').classList.add('flex');
  $('pdfTxt').textContent = `${filename}\n문서를 생성하고 있습니다...`;

  const container = document.createElement('div');
  container.className = 'markdown-body p-10 bg-white text-gray-900';
  container.style.fontFamily = state.settings.fontFamily;
  container.style.fontSize = state.settings.fontSize + 'px';
  container.style.lineHeight = state.settings.lineSpacing;
  
  try {
    container.innerHTML = marked.parse(content || '내용 없음');
  } catch(e) {
    container.innerHTML = '<p>렌더링 오류</p>';
  }

  document.body.appendChild(container);

  const opt = {
    margin: 15,
    filename: filename,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
  };

  try {
    await html2pdf().set(opt).from(container).save();
  } catch (err) {
    console.error(err);
    alert('PDF 생성 중 오류가 발생했습니다.');
  } finally {
    document.body.removeChild(container);
    $('pdfModal').classList.add('hidden');
  }
}

$('pdfCur').onclick = async () => {
  const act = state.tabs.find(t => t.id === state.activeId);
  if (act) await generatePDF(act.content, `${state.prefix ? sanitize(state.prefix)+'-' : ''}${sanitize(act.title)}.pdf`);
};

$('pdfAll').onclick = async () => {
  const combined = state.tabs.map(t => `# ${t.title}\n\n${t.content}\n\n---\n\n`).join('');
  await generatePDF(combined, `${state.prefix ? sanitize(state.prefix)+'-' : ''}전체통합.pdf`);
};

$('pdfEach').onclick = async () => {
  $('pdfModal').classList.remove('hidden');
  $('pdfModal').classList.add('flex');
  
  for (let i = 0; i < state.tabs.length; i++) {
    const t = state.tabs[i];
    $('pdfTxt').textContent = `(${i+1}/${state.tabs.length})\n${t.title} PDF 생성 중...`;
    
    const container = document.createElement('div');
    container.className = 'markdown-body p-10 bg-white text-gray-900';
    container.style.fontFamily = state.settings.fontFamily;
    container.style.fontSize = state.settings.fontSize + 'px';
    container.style.lineHeight = state.settings.lineSpacing;
    container.innerHTML = marked.parse(t.content || '내용 없음');
    document.body.appendChild(container);

    const opt = {
      margin: 15,
      filename: `${state.prefix ? sanitize(state.prefix)+'-' : ''}${sanitize(t.title)}.pdf`,
      image: { type: 'jpeg', quality: 0.98 },
      html2canvas: { scale: 2, useCORS: true },
      jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };

    await html2pdf().set(opt).from(container).save();
    document.body.removeChild(container);
  }
  
  $('pdfModal').classList.add('hidden');
};

// 프로젝트 백업/복구
$('saveProjectBtn').onclick = () => {
  const projectData = JSON.stringify({
    prefix: state.prefix,
    tabs: state.tabs,
    settings: state.settings
  }, null, 2);
  const blob = new Blob([projectData], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `AI답변비교_백업_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
};

$('loadProjectBtn').onclick = () => $('loadProjectInput').click();

$('loadProjectInput').onchange = e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.tabs && Array.isArray(data.tabs)) {
        state.prefix = data.prefix || '';
        state.tabs = data.tabs;
        state.activeId = data.tabs[0]?.id || '';
        if (data.settings) {
          state.settings = { ...state.settings, ...data.settings };
          state.settings.customFonts.forEach(font => loadCustomFont(font.name, font.url));
        }
        save(); render();
        msg('성공', '프로젝트를 성공적으로 불러왔습니다.');
      } else {
        msg('오류', '올바른 백업 파일 형식이 아닙니다.');
      }
    } catch(err) {
      msg('오류', '파일을 읽는 중 문제가 발생했습니다.');
    }
    $('loadProjectInput').value = '';
  };
  reader.readAsText(file);
};

// 모바일 뷰 토글
$('btnView').onclick = () => {
  const isMobile = document.body.style.maxWidth === '480px';
  document.body.style.maxWidth = isMobile ? 'none' : '480px';
  document.body.style.margin = isMobile ? '0' : '0 auto';
  document.body.style.boxShadow = isMobile ? 'none' : '0 0 20px rgba(0,0,0,0.5)';
  $('viewText').textContent = isMobile ? '모바일 가로보기' : '전체화면 복귀';
  if (!isMobile) msg('미리보기', '모바일 기기에서의 가로 폭을 시뮬레이션합니다.');
};

// 단축키
window.addEventListener('keydown', e => {
  if (e.ctrlKey && e.altKey) {
    if (e.key === 'ArrowLeft') { e.preventDefault(); $('moveL').click(); }
    else if (e.key === 'ArrowRight') { e.preventDefault(); $('moveR').click(); }
  }
});

// 초기화 실행
render();
</script>
</body>
