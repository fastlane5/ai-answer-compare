<!-- 💡 3. 옛날 React App의 manifest.json 캐시를 완벽히 차단하고 덮어쓰는 인라인 매니페스트 설정 -->
<link rel="manifest" href="data:application/manifest+json,{%22name%22:%22AI%20%EB%B0%B5%EB%B3%80%20%EB%B9%84%EA%B5%90%22,%22short_name%22:%22AI%20%EB%B0%B5%EB%B3%80%20%EB%B9%84%EA%B5%90%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22theme_color%22:%22%231e293b%22}" />

<!-- 💡 4. 세련된 📝 이모지 파비콘 강제 지정 (기존 리액트 파란 원자 아이콘 삭제) -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📝</text></svg>">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<!-- 💡 5. 구형 서비스 워커 및 구형 캐시 강제 삭제 스크립트 (접속 시 자동 즉시 청소) -->
<script>
  if ('serviceWorker' in navigator) {
    try {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for(let registration of registrations) {
          registration.unregister().catch(function(e) { console.log(e); });
        }
      }).catch(function(e) { console.log(e); });
    } catch(e) { console.log(e); }
  }
  if (window.caches) {
    try {
      caches.keys().then(function(names) {
        for (let name of names) {
          caches.delete(name).catch(function(e) { console.log(e); });
        }
      }).catch(function(e) { console.log(e); });
    } catch(e) { console.log(e); }
  }
</script>

<style>
/* 4K 고해상도 모니터 대응 메뉴, 버튼, 아이콘 크기 동적 동기화 */
:root {
  --ui-font-size: 16px; /* 💡 메뉴 크기 기본값을 16px로 최적 세팅 */
}

.custom-scrollbar::-webkit-scrollbar{width:6px;height:6px}
.custom-scrollbar::-webkit-scrollbar-track{background:transparent}
.custom-scrollbar::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
.custom-scrollbar::-webkit-scrollbar-thumb:hover{background:#94a3b8}

/* 4K 해상도 대응 반응형 클래스 시스템 */
.ui-text,
.ui-text button,
.ui-text select,
.ui-text input,
.ui-text label,
.ui-text span,
.ui-text strong,
.ui-text a,
.ui-text kbd {
  font-size: var(--ui-font-size, 16px) !important;
}

/* 폰트가 커짐에 따라 Lucide SVG 아이콘 크기도 미려하게 비례 동기화 */
.ui-text svg {
  width: calc(var(--ui-font-size, 16px) + 2px) !important;
  height: calc(var(--ui-font-size, 16px) + 2px) !important;
}

/* 📝 웹 미리보기 마크다운 스타일 및 표(Table) 최적화 */
.markdown-body {
  color: #24292f;
  font-size: 1.05em;
  line-height: 1.75;
}
.markdown-body h1{
  font-size: 1.8em;
  font-weight: 800;
  margin-top: 1.5em;
  margin-bottom: 0.6em;
  border-bottom: 2px solid #e1e4e8;
  padding-bottom: 0.3em;
}
.markdown-body h2{
  font-size: 1.4em;
  font-weight: 700;
  margin-top: 1.4em;
  margin-bottom: 0.6em;
  border-bottom: 1px solid #e1e4e8;
  padding-bottom: 0.3em;
}
.markdown-body h3{
  font-size: 1.25em;
  font-weight: 700;
  margin-top: 1.2em;
  margin-bottom: 0.5em;
}
.markdown-body p{
  margin-bottom: 1em;
  word-break: keep-all;
  overflow-wrap: break-word;
}
.markdown-body ul{
  list-style-type: disc;
  margin-left: 1.5em;
  margin-bottom: 1em;
}
.markdown-body ol{
  list-style-type: decimal;
  margin-left: 1.5em;
  margin-bottom: 1em;
}
.markdown-body li{
  margin-bottom: 0.4em;
}

/* 💡 인용구(Blockquote) 디자인 개편: 배경 연한 그레이 주입, 가독성 200% 향상 */
.markdown-body blockquote {
  border-left: 4px solid #3b82f6; /* 신뢰감을 주는 블루 메인 포인트 */
  padding: 12px 18px;
  color: #4b5563;
  background-color: #f8fafc; /* 연한 Slate 블루그레이 배경 */
  border-radius: 0 8px 8px 0;
  margin: 1.2em 0;
}
.markdown-body blockquote p {
  margin-bottom: 0 !important;
  color: #374151 !important;
  font-weight: 500;
}

/* 💡 본문 인라인 코드 디자인 개편: 붉은색 제거, 눈이 편한 고대비 가독성 코드 적용 */
.markdown-body code {
  background-color: #f1f5f9; /* 은은한 연회색 배경 */
  color: #0f172a;            /* 신뢰감 있는 짙은 다크 차콜 네이비 색상 */
  padding: 2px 6px;
  border-radius: 6px;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
  font-size: 0.9em;
  border: 1px solid #e2e8f0;  /* 얇은 경계 테두리로 선명함 유지 */
  font-weight: 600;
}

/* 코드 블록(Pre) 스타일 */
.markdown-body pre {
  background-color: #1e293b;
  color: #f8fafc;
  padding: 1.2em;
  border-radius: 10px;
  overflow-x: auto;
  margin-bottom: 1.2em;
  white-space: pre-wrap;
  border: 1px solid #334155;
}
.markdown-body pre code {
  background: transparent;
  color: inherit;
  padding: 0;
  font-size: 0.9em;
  border-radius: 0;
}

/* 테이블 구조 최적화 */
.markdown-body table { width: 100%; border-collapse: collapse; margin-bottom: 1.5rem; font-size: 0.9em; }
.markdown-body th, .markdown-body td { border: 1px solid #e2e8f0; padding: 10px 14px; text-align: left; }
.markdown-body th { background-color: #f8fafc; font-weight: bold; color: #1e293b; }
</style>
</head>
<body class="bg-gray-800 min-h-screen flex items-center justify-center print:bg-white transition-colors duration-300">
<div id="app" class="flex flex-col bg-gray-50 font-sans w-full h-screen overflow-hidden relative transition-all duration-500">

    </div>
    <div class="flex items-center gap-2 sm:gap-4 overflow-x-auto w-full sm:w-auto pb-1 sm:pb-0 custom-scrollbar">

  </div>
</div>

<!-- === 팝업 모달창 목록 === -->
<div id="preModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden items-center justify-center z-[5000] p-4">
  <div class="bg-white p-6 rounded-xl w-full max-w-sm shadow-2xl">
    <h2 class="font-bold mb-3 text-lg text-gray-800">파일명 접두사 설정</h2>

      <button id="preCancel" class="w-1/3 bg-gray-200 hover:bg-gray-300 rounded-lg py-3 font-semibold text-gray-700">취소</button>
      <button id="preOk" class="w-2/3 bg-blue-600 hover:bg-blue-700 text-white rounded-lg py-3 font-semibold">확인</button>
    </div>
  </div>
</div>

<!-- 💡 Vercel 실시간 웹 분석 스크립트 연결 (Vercel 배포 환경에서만 안전하게 동작하도록 자동 분기 처리) -->
<script>
  if (window.location.hostname.endsWith('vercel.app')) {
    const analyticScript = document.createElement('script');
    analyticScript.src = "//_vercel/insights/script.js";
    analyticScript.defer = true;
    document.body.appendChild(analyticScript);
  }
</script>

<script>
// 실시간 브라우저 타이틀 강제 재동기화 (OneTab 메모리 캐시 및 수집기 강제 제어)
document.title = "AI 답변 비교";

// 전역 설정 상수 목록 (엄선된 최정상급 프리미엄 한글 웹폰트 8종 기본 세팅)
const TAB_NAMES = ["제미나이pro","제미나이3.5","챗GPT","클로드","퍼플렉서티","라마4","그록4","META"];
const STANDARD_FONTS = ["Pretendard", "Noto Sans KR", "Nanum Gothic", "Nanum Myeongjo", "D2Coding", "Gowun Dodum", "Gowun Batang", "Nanum Pen Script", "sans-serif", "serif", "monospace"];
const LINES = ["1.00","1.15","1.25","1.50","1.75","2.00","2.50","3.00"];

// 데이터 정제 유틸리티
const sanitize = s => s.replace(/[\\/:*?"<>|]/g,'_').trim().slice(0,80) || 'untitled';
const esc = s => String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));

// 메인 상태 정보 객체 (본문 크기 16, 메뉴 크기 16 동기화)
let state = {
  prefix: localStorage.getItem('yt-script-prefix') || '',
  tabs: [],
  activeId: '',
  settings: JSON.parse(localStorage.getItem('yt-script-settings') || '{"fontFamily":"Pretendard","fontSize":16,"tabFontSize":14,"lineSpacing":1.5,"uiFontSize":16,"customFonts":[]}'),
  isPreview: false, 
  isMobile: false,
  editingId: null
};

// 동적 로컬 환경 보정
if (!state.settings.uiFontSize) {
  state.settings.uiFontSize = 16;
}
if (!state.settings.fontFamily || state.settings.fontFamily === 'sans-serif') {
  state.settings.fontFamily = 'Pretendard'; // 기본 최고급 폰트로 프리텐다드 설정
}
if (!state.settings.customFonts) {
  state.settings.customFonts = [];
}

// 💡 [초강력 복구 로직] 저장되어 있던 커스텀 글꼴을 안전하게 정화하여 헤더에 자동 로드
state.settings.customFonts.forEach(font => {
  if (font.url) {
    try {
      // 혹시라도 예전 버그로 인해 마크다운 링크 양식([링크](링크))이 메모리에 들어있다면 자동 정화
      let cleanUrl = font.url.trim();
      if (cleanUrl.includes('](')) {
        const match = cleanUrl.match(/\(([^)]+)\)/);
        if (match && match[1]) {
          cleanUrl = match[1].trim();
        }
      }
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = cleanUrl;
      document.head.appendChild(link);
    } catch(err) { console.error(err); }
  }
});

// 로컬 데이터 수합 및 예외 백업 복구
try {
  const saved = localStorage.getItem('yt-script-tabs');
  if (saved) { 
    state.tabs = JSON.parse(saved); 
    state.activeId = state.tabs[0]?.id || ''; 
  } else { 
    state.tabs = TAB_NAMES.map((n, i) => ({ id: `tab-${i}`, title: n, content: '' })); 
    state.activeId = state.tabs[0].id; 
  }
} catch { 
  state.tabs = TAB_NAMES.map((n, i) => ({ id: `tab-${i}`, title: n, content: '' })); 
  state.activeId = state.tabs[0].id; 
}

const $ = id => document.getElementById(id);

// 성능 최적화용 Debounce 디바운스 자동 저장 타이머
let timer = null; 
const save = () => { 
  clearTimeout(timer); 
  timer = setTimeout(() => { 
    localStorage.setItem('yt-script-tabs', JSON.stringify(state.tabs)); 
    localStorage.setItem('yt-script-settings', JSON.stringify(state.settings)); 
    localStorage.setItem('yt-script-prefix', state.prefix); 
  }, 400); 
};

// UI 상태 그리기 (동적 마크다운 해석 포함)
function render() {
  const active = state.tabs.find(t => t.id === state.activeId);
  const uiSizeVal = state.settings.uiFontSize || 16;
  
  // 기본 내장 폰트 리스트와 사용자 지정 폰트의 병합
  const customFontNames = state.settings.customFonts.map(f => f.name);
  const totalFonts = [...STANDARD_FONTS, ...customFontNames];

  // 1. 설정 셀렉트 및 폼 바인딩
  $('fontSel').innerHTML = totalFonts.map(f => `<option value="${f}" ${state.settings.fontFamily === f ? 'selected' : ''}>${f}</option>`).join('');
  $('lineSel').innerHTML = LINES.map(l => `<option value="${l}" ${String(state.settings.lineSpacing) === l ? 'selected' : ''}>${l}</option>`).join('');
  $('fontSize').value = state.settings.fontSize; 
  $('tabSize').value = state.settings.tabFontSize;
  $('uiFontSize').value = uiSizeVal;
  $('preLabel').textContent = state.prefix || '(없음)';
  
  // 등록된 커스텀 개별 폰트 활성화 시에만 휴지통 단추 보이기
  const isCustomSelected = state.settings.customFonts.some(f => f.name === state.settings.fontFamily);
  if (isCustomSelected) {
    $('delFontBtn').classList.remove('hidden');
  } else {
    $('delFontBtn').classList.add('hidden');
  }

  // CSS 전역 변수(--ui-font-size)에 동적 매핑하여 전 지점 아이콘 및 글자 동시 스케일링
  document.documentElement.style.setProperty('--ui-font-size', uiSizeVal + 'px');
  
  // 2. 글자수 및 단어수 연산 표시
  if (active) {
    const charCount = active.content.replace(/\n+$/, '').length;
    const charNoSpace = active.content.replace(/\s/g, '').length;
    const wordCount = active.content.trim() ? active.content.trim().split(/\s+/).length : 0;
    
    $('expName').textContent = `👉 예상 파일명: ${state.prefix ? sanitize(state.prefix) + '-' : ''}${sanitize(active.title)}.txt`;
    $('cnt').innerHTML = `글자수: <strong class="text-blue-600">${charCount}</strong> <span class="text-gray-400">(${charNoSpace})</span> | 단어수: <strong class="text-indigo-600">${wordCount}</strong>`;
  } else {
    $('expName').textContent = '';
    $('cnt').innerHTML = '';
  }

  // 3. 탭 바인딩 및 그리기
  $('tabBar').innerHTML = state.tabs.map(t => {
    const isA = t.id === state.activeId;
    if (state.editingId === t.id) {
      return `
        <div class="relative flex-shrink-0 group">
          <div class="flex items-center bg-white border-t border-l border-r rounded-t-lg mx-0.5 px-2 sm:px-3 py-1.5 sm:py-2 z-10 relative">
            <input id="renameInput" type="text" value="${esc(t.title)}" class="border border-blue-400 rounded px-2 py-0.5 sm:py-1 outline-none text-xs sm:text-sm w-24 sm:w-32" />
            <button id="saveRenameBtn" class="ml-1 text-green-600 hover:bg-green-50 p-1 rounded">
              <svg class="w-3.5 h-3.5" xmlns="[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </button>
            <button id="cancelRenameBtn" class="text-red-500 hover:bg-red-50 p-1 rounded">
              <svg class="w-3.5 h-3.5" xmlns="[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
          </div>
        </div>
      `;
    }
    return `
      <div class="relative flex-shrink-0 group">
        <button data-id="${t.id}" class="tabBtn px-3 sm:px-4 py-1.5 sm:py-2 mx-0.5 rounded-t-lg border-t border-l border-r font-semibold whitespace-nowrap ${isA ? 'bg-white border-gray-300 text-blue-600 shadow-[0_2px_0_0_white]' : 'bg-gray-200 border-transparent text-gray-500 hover:bg-gray-300'}" style="font-size:${state.settings.tabFontSize}px">
          ${esc(t.title)}${t.content.trim() ? '<span class="ml-1.5 sm:ml-2 inline-block w-2 h-2 bg-green-400 rounded-full"></span>' : ''}
        </button>
      </div>`;
  }).join('') + `<button id="addTab" class="px-3 py-1.5 bg-gray-200 hover:bg-gray-300 rounded-t-lg font-bold ml-1">+</button>`;

  // 동적 생성된 탭 바인딩 직후 포커스 처리
  if (state.editingId) {
    const input = $('renameInput');
    if (input) {
      input.focus();
      input.select();
      input.onkeydown = e => {
        if (e.key === 'Enter') finishRename(input.value);
        if (e.key === 'Escape') cancelRename();
      };
      $('saveRenameBtn').onclick = () => finishRename(input.value);
      $('cancelRenameBtn').onclick = cancelRename;
    }
  }

  // 4. 에디터 및 미리보기 폰트 속성 완벽 동기화 적용
  const ed = $('editor'), pv = $('preview');
  if (active) {
    ed.style.fontFamily = `'${state.settings.fontFamily}', sans-serif`; 
    pv.style.fontFamily = `'${state.settings.fontFamily}', sans-serif`;
    ed.style.fontSize = state.settings.fontSize + 'px'; 
    pv.style.fontSize = state.settings.fontSize + 'px';
    ed.style.lineHeight = state.settings.lineSpacing; 
    pv.style.lineHeight = state.settings.lineSpacing;
    ed.value = active.content;
    
    if (state.isPreview) { 
      ed.classList.add('hidden'); 
      pv.classList.remove('hidden'); 
      pv.innerHTML = window.marked ? marked.parse(active.content || '내용이 없습니다.') : esc(active.content); 
    } else { 
      pv.classList.add('hidden'); 
      ed.classList.remove('hidden'); 
      ed.placeholder = `${active.title} 답변을 입력하세요...\n(내용은 브라우저에 자동 저장됩니다)`; 
    }
  }

  // 5. 토글 버튼 마크업 갱신
  $('previewBtn').innerHTML = state.isPreview ? `<i data-lucide="code" class="w-3.5 h-3.5"></i> 편집 모드` : `<i data-lucide="eye" class="w-3.5 h-3.5"></i> 미리보기`;
  $('previewBtn').className = state.isPreview ? 'flex items-center gap-1 px-3 py-1.5 rounded bg-indigo-600 text-white text-xs font-medium' : 'flex items-center gap-1 px-3 py-1.5 rounded bg-indigo-50 text-indigo-700 border border-indigo-200 text-xs font-medium';
  $('viewText').textContent = state.isMobile ? 'PC 보기' : '모바일 가로보기';
  
  // 가로 스마트폰 목업 스케일 및 클래스 바인딩
  $('app').className = `flex flex-col bg-gray-50 font-sans overflow-hidden relative transition-all duration-500 ${state.isMobile ? 'w-full max-w-[932px] h-[450px] shadow-2xl sm:rounded-[2rem] sm:border-[12px] sm:border-black' : 'w-full h-screen'}`;
  
  // Lucide 아이콘 재생성 (버그 없는 동적 바인딩 보장)
  if (typeof lucide !== 'undefined') {
    lucide.createIcons();
  }
}

function msg(t, m) { 
  $('msgT').textContent = t; 
  $('msgM').textContent = m; 
  $('msgModal').classList.remove('hidden'); 
  $('msgModal').classList.add('flex'); 
  if (typeof lucide !== 'undefined') {
    lucide.createIcons();
  }
}

function dl(name, content) { 
  const b = new Blob([content], { type: 'text/plain;charset=utf-8' }); 
  const u = URL.createObjectURL(b); 
  const a = document.createElement('a'); 
  a.href = u; 
  a.download = sanitize(name); 
  document.body.appendChild(a); 
  a.click(); 
  a.remove(); 
  URL.revokeObjectURL(u); 
}

// 🚀 백그라운드 무진동 초스피드 PDF 다이렉트 컨버터 엔진 (페이지 중간 끊김 방지 업그레이드)
async function genPdf(title, content, file) {
  if (!window.html2pdf || !window.marked) { 
    msg('오류', 'PDF 라이브러리를 준비하지 못했습니다. 새로고침을 해주세요.'); 
    return; 
  }
  
  const safeTitle = esc(title);
  const safePrefix = esc(state.prefix);
  const htmlContent = window.marked.parse(content || '*내용 없음*');

  // PDF 전용 독립 정밀 렌더링 스타일 (페이지 잘림 방지 속성 강제 주입 및 마크다운 고대비 가독성 패널)
  const pdfStyle = `
    <style>
      .pdf-box { padding:40px; font-family:'${state.settings.fontFamily}', sans-serif; font-size:${state.settings.fontSize}px; line-height:${state.settings.lineSpacing}; background:white; color:#1f2937; word-break:keep-all; overflow-wrap:break-word; }
      
      /* 핵심: 문장블록, 목록, 표의 줄, 제목, 코드 블록이 임의로 잘리지 않도록 제어 */
      .pdf-md p, .pdf-md li, .pdf-md blockquote, .pdf-md pre, .pdf-md tr, .pdf-md h1, .pdf-md h2, .pdf-md h3, .pdf-md figure {
        page-break-inside: avoid !important;
        break-inside: avoid !important;
        break-inside: avoid-page !important;
      }
      
      .pdf-md h1{font-size:2em; font-weight:bold; margin:1.5rem 0 1rem; border-bottom:3px solid #111; padding-bottom:0.4rem;}
      .pdf-md h2{font-size:1.6em; font-weight:bold; margin:1.2rem 0 0.8rem; border-bottom:1px solid #e5e7eb; padding-bottom:0.3rem;}
      .pdf-md h3{font-size:1.3em; font-weight:bold; margin:1rem 0 0.6rem;}
      .pdf-md p{margin-bottom:1rem;}
      .pdf-md ul{list-style:disc; margin-left:1.5rem; margin-bottom:1rem;}
      .pdf-md ol{list-style:decimal; margin-left:1.5rem; margin-bottom:1rem;}
      
      /* PDF 출력 전용 고대비 인용구 디자인 동기화 */
      .pdf-md blockquote {
        border-left: 4px solid #3b82f6 !important;
        padding: 12px 18px !important;
        background-color: #f8fafc !important;
        border-radius: 0 8px 8px 0 !important;
        margin: 1.2em 0 !important;
      }
      .pdf-md blockquote p {
        margin-bottom: 0 !important;
        color: #374151 !important;
        font-weight: 500 !important;
      }
      
      /* PDF 출력 전용 고대비 인라인 코드 디자인 동기화 */
      .pdf-md code {
        background-color: #f1f5f9 !important;
        color: #0f172a !important;
        padding: 2px 6px !important;
        border-radius: 6px !important;
        font-size: 0.9em !important;
        border: 1px solid #e2e8f0 !important;
        font-weight: 600 !important;
      }

      .pdf-md pre{background:#1f2937; color:#f9fafb; padding:1rem; border-radius:8px; white-space:pre-wrap; word-break:break-all;}
      
      /* PDF 내부 테이블(표) 레이아웃 최적화 */
      .pdf-md table { width: 100%; border-collapse: collapse; margin-bottom: 1.5rem; page-break-inside: auto; }
      .pdf-md tr { page-break-inside: avoid !important; break-inside: avoid !important; }
      .pdf-md th, .pdf-md td { border: 1px solid #cbd5e1; padding: 10px 14px; text-align: left; font-size: 0.9em; word-break: keep-all; }
      .pdf-md th { background-color: #f1f5f9; font-weight: bold; }
    </style>
  `;

  const htmlString = `
    ${pdfStyle}
    <div class="pdf-box">
      <div style="text-align:center; border-bottom:4px solid #1f2937; padding-bottom:1rem; margin-bottom:2rem">
        <h1 style="font-size:28px; font-weight:800; margin:0; color:#111827">${safeTitle}</h1>
        ${safePrefix ? `<p style="color:#6b7280; margin-top:8px">프로젝트 접두사: ${safePrefix}</p>` : ''}
      </div>
      <div class="pdf-md">${htmlContent}</div>
    </div>
  `;

  // html2pdf 정밀 변환 빌드 설정
  const opt = {
    margin: 12, 
    filename: sanitize(file),
    image: { type: 'jpeg', quality: .98 },
    html2canvas: { scale: 2, useCORS: true, logging: false },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
    // css 및 legacy 모드를 복합 활성화하여 page-break-inside를 완벽하게 탐지
    pagebreak: { mode: ['css', 'legacy'] }
  };

  try {
    await html2pdf().from(htmlString).set(opt).save();
  } catch (err) {
    console.error(err);
    msg('오류', 'PDF 파일 빌드 중 에러가 발생했습니다.');
  }
}

// 탭 이름 변경 제어 핸들러
function finishRename(newTitle) {
  if (!newTitle.trim()) { cancelRename(); return; }
  state.tabs = state.tabs.map(t => t.id === state.editingId ? { ...t, title: newTitle.trim() } : t);
  state.editingId = null;
  save(); 
  render();
}

function cancelRename() {
  state.editingId = null;
  render();
}

// === 이벤트 핸들러 ===
document.addEventListener('click', e => {
  const b = e.target.closest('.tabBtn'); 
  if (b) { 
    state.editingId = null; // 다른 탭 클릭 강제 이동 시 편집폼 상태 즉시 초기화
    state.activeId = b.dataset.id; 
    render(); 
    return; 
  }
  if (e.target.id === 'addTab') {
    state.editingId = null;
    const id = `tab-${Date.now()}`; state.tabs.push({id,title:'새 탭',content:''}); state.activeId = id; save(); render();
  }
});

// 더블클릭 변경 지원
$('tabBar').addEventListener('dblclick', e => { 
  const b = e.target.closest('.tabBtn'); 
  if (!b) return; 
  state.editingId = b.dataset.id;
  render();
});

$('editor').addEventListener('input', e => { 
  state.tabs = state.tabs.map(t => t.id === state.activeId ? { ...t, content: e.target.value } : t); 
  save(); 
  
  // 실시간 글자수 및 단어수 업데이트 (에디터 끊김 현상 방지를 위해 UI의 카운터 영역만 즉시 업데이트)
  const charCount = e.target.value.replace(/\n+$/, '').length;
  const charNoSpace = e.target.value.replace(/\s/g, '').length;
  const wordCount = e.target.value.trim() ? e.target.value.trim().split(/\s+/).length : 0;
  $('cnt').innerHTML = `글자수: <strong class="text-blue-600">${charCount}</strong> <span class="text-gray-400">(${charNoSpace})</span> | 단어수: <strong class="text-indigo-600">${wordCount}</strong>`;
});

// 입력 제어 바인딩 (메뉴 크기 UI 연동 추가)
$('fontSel').onchange = e => { state.settings.fontFamily = e.target.value; save(); render(); };
$('lineSel').onchange = e => { state.settings.lineSpacing = parseFloat(e.target.value); save(); render(); };
$('fontSize').oninput = e => { state.settings.fontSize = parseInt(e.target.value) || 16; save(); render(); };
$('tabSize').oninput = e => { state.settings.tabFontSize = parseInt(e.target.value) || 14; save(); render(); };
$('uiFontSize').oninput = e => { state.settings.uiFontSize = parseInt(e.target.value) || 16; save(); render(); };

// 💡 [글꼴 혁신 3단계] 글꼴 추가/삭제 및 간편 프리셋 클릭 이벤트 리스너 처리
$('addFontBtn').onclick = () => {
  $('fontNameInput').value = '';
  $('fontUrlInput').value = '';
  $('fontModal').classList.remove('hidden');
  $('fontModal').classList.add('flex');
  $('fontNameInput').focus();
};

$('fontCancel').onclick = () => {
  $('fontModal').classList.add('hidden');
  $('fontModal').classList.remove('flex');
};

// 프리셋 배지 단추 클릭 시 인풋 자동 완성
document.querySelectorAll('.preset-font-badge').forEach(btn => {
  btn.onclick = () => {
    $('fontNameInput').value = btn.dataset.name;
    $('fontUrlInput').value = btn.dataset.url;
  };
});

$('fontOk').onclick = () => {
  const fontName = $('fontNameInput').value.trim();
  let fontUrl = $('fontUrlInput').value.trim();

  if (!fontName) {
    return alert('글꼴 이름을 입력해 주세요.');
  }

  // 중복 검사
  const exists = [...STANDARD_FONTS, ...state.settings.customFonts.map(f => f.name)].includes(fontName);
  if (exists) {
    return alert('이미 등록되어 있는 글꼴 이름입니다.');
  }

  // 💡 [초강력 자가 정화 코드] 마크다운 양식이 주소에 포함된 경우 순수 URL만 자동 추출
  if (fontUrl.includes('](')) {
    const match = fontUrl.match(/\(([^)]+)\)/);
    if (match && match[1]) {
      fontUrl = match[1].trim();
    }
  }

  // 웹 폰트 URL이 있을 경우 동적으로 CSS 파일 삽입
  if (fontUrl) {
    try {
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = fontUrl;
      document.head.appendChild(link);
    } catch(err) {
      console.error('웹폰트 로드 실패', err);
    }
  }

  // 상태 배열에 기록 및 영구 저장
  state.settings.customFonts.push({ name: fontName, url: fontUrl });
  state.settings.fontFamily = fontName; // 추가 후 바로 해당 폰트 적용
  
  $('fontModal').classList.add('hidden');
  $('fontModal').classList.remove('flex');

  save();
  render();
};

$('delFontBtn').onclick = () => {
  const curFont = state.settings.fontFamily;
  if (!confirm(`등록하신 커스텀 글꼴 "${curFont}"을(를) 삭제하시겠습니까?`)) return;

  state.settings.customFonts = state.settings.customFonts.filter(f => f.name !== curFont);
  state.settings.fontFamily = "Pretendard"; // 기본 한글 명품 폰트 프리텐다드로 회귀

  save();
  render();
};

$('moveL').onclick = () => { 
  const i = state.tabs.findIndex(t => t.id === state.activeId); 
  if (i > 0) { 
    [state.tabs[i], state.tabs[i-1]] = [state.tabs[i-1], state.tabs[i]]; 
    save(); 
    render(); 
  } 
};
$('moveR').onclick = () => { 
  const i = state.tabs.findIndex(t => t.id === state.activeId); 
  if (i < state.tabs.length - 1) { 
    [state.tabs[i], state.tabs[i+1]] = [state.tabs[i+1], state.tabs[i]]; 
    save(); 
    render(); 
  } 
};

$('rename').onclick = () => { 
  state.editingId = state.activeId;
  render();
};

$('delTab').onclick = () => { 
  if (state.tabs.length <= 1) return msg('삭제 불가', '최소 1개 탭 유지'); 
  if (!confirm('정말 삭제하시겠습니까?')) return; 
  state.tabs = state.tabs.filter(t => t.id !== state.activeId); 
  state.activeId = state.tabs[0]?.id || ''; 
  save(); 
  render(); 
};

$('previewBtn').onclick = () => { state.isPreview = !state.isPreview; render(); };
$('btnView').onclick = () => { state.isMobile = !state.isMobile; render(); };
$('setPre').onclick = () => { $('preInput').value = state.prefix; $('preModal').classList.remove('hidden'); $('preModal').classList.add('flex'); $('preInput').focus(); };
$('preCancel').onclick = () => $('preModal').classList.add('hidden');
$('preOk').onclick = () => { state.prefix = $('preInput').value.trim(); $('preModal').classList.add('hidden'); save(); render(); };
$('msgOk').onclick = () => $('msgModal').classList.add('hidden');

// 💡 본문 내 코드 블록(```) 영역을 완벽하게 찾아 인용구(>)로 가공해주는 치트키 알고리즘
$('convertCodeBlocks').onclick = () => {
  const activeTab = state.tabs.find(t => t.id === state.activeId);
  if (!activeTab || !activeTab.content.trim()) {
    return msg('알림', '변환을 진행할 텍스트가 현재 탭에 없습니다.');
  }

  // 본문에 백틱 세 개 코드 블록이 존재하는지 확인 검사
  const hasCodeBlock = /```[\s\S]*?```/.test(activeTab.content);
  if (!hasCodeBlock) {
    return msg('알림', '본문에 백틱(```)으로 묶인 코드 블록 영역이 감지되지 않았습니다.');
  }

  // 코드 블록 변환 정규식 연산 처리
  const convertedText = activeTab.content.replace(/```[a-zA-Z0-9-]*\r?\n([\s\S]*?)```/g, (match, codeContent) => {
    const lines = codeContent.split(/\r?\n/);
    return lines.map(line => `> ${line}`).join('\n');
  });

  // 상태값 동기화 및 즉각 보관 처리
  state.tabs = state.tabs.map(t => t.id === state.activeId ? { ...t, content: convertedText } : t);
  save();
  render();
  msg('변환 완료', '본문 안의 코드 블록을 독자들이 읽기 편한 인용구 서식(>)으로 일괄 자동 변환했습니다!');
};

$('clearCur').onclick = () => { 
  const a = state.tabs.find(t => t.id === state.activeId); 
  if (!a?.content.trim()) return msg('알림', '이미 비어있음'); 
  if (confirm(`"${a.title}" 내용을 모두 지우시겠습니까?`)) { 
    state.tabs = state.tabs.map(t => t.id === state.activeId ? { ...t, content: '' } : t); 
    save(); 
    render(); 
  } 
};

$('clearAll').onclick = () => { 
  if (!confirm('🚨 모든 탭의 답변 내용이 영구 삭제되며 파일명 접두사도 초기화됩니다. 계속하시겠습니까?')) return; 
  state.tabs = state.tabs.map(t => ({ ...t, content: '' })); 
  state.prefix = ''; 
  save(); 
  render(); 
  msg('완료', '모든 대본과 접두사가 초기화되었습니다.'); 
};

// === TXT 일괄 저장 핸들러 ===
$('txtCur').onclick = () => { 
  const a = state.tabs.find(t => t.id === state.activeId); 
  if (!a?.content.trim()) return msg('실패', '내용 없음'); 
  dl(`${state.prefix ? state.prefix + '-' : ''}${a.title}.txt`, a.content); 
};
$('txtAll').onclick = () => { 
  const l = state.tabs.filter(t => t.content.trim()); 
  if (!l.length) return msg('실패', '내용 없음'); 
  dl(`${state.prefix ? state.prefix + '-' : ''}AI답변_통합본.txt`, l.map(t => `========== [ ${t.title} ] ==========\n${t.content}`).join('\n\n')); 
};
$('txtEach').onclick = async () => { 
  const l = state.tabs.filter(t => t.content.trim()); 
  if (!l.length) return msg('실패', '내용 없음'); 
  for (const t of l) { 
    dl(`${state.prefix ? state.prefix + '-' : ''}${t.title}.txt`, t.content); 
    await new Promise(r => setTimeout(r, 400)); 
  } 
};

// === PDF 일괄 저장 핸들러 ===
$('pdfCur').onclick = async () => { 
  const a = state.tabs.find(t => t.id === state.activeId); 
  if (!a?.content.trim()) return msg('불가', '내용 없음'); 
  
  $('pdfModal').classList.remove('hidden'); 
  $('pdfModal').classList.add('flex'); 
  $('pdfTxt').textContent = `"${a.title}" PDF 생성중`; 
  
  if (!state.isPreview) {
    state.isPreview = true;
    render();
  }
  
  await new Promise(r => setTimeout(r, 400)); 
  await genPdf(a.title, a.content, `${state.prefix ? state.prefix + '-' : ''}${a.title}.pdf`); 
  $('pdfModal').classList.add('hidden'); 
};

$('pdfAll').onclick = async () => { 
  const l = state.tabs.filter(t => t.content.trim()); 
  if (!l.length) return msg('불가', '내용 없음'); 
  
  $('pdfModal').classList.remove('hidden'); 
  $('pdfModal').classList.add('flex'); 
  $('pdfTxt').textContent = '통합 PDF 생성중'; 
  
  if (!state.isPreview) {
    state.isPreview = true;
    render();
  }
  
  await new Promise(r => setTimeout(r, 400)); 
  await genPdf('AI 답변 비교 통합 문서', l.map(t => `# ${t.title}\n---\n${t.content}`).join('\n\n'), `${state.prefix ? state.prefix + '-' : ''}AI답변_통합본.pdf`); 
  $('pdfModal').classList.add('hidden'); 
};

$('pdfEach').onclick = async () => { 
  const l = state.tabs.filter(t => t.content.trim()); 
  if (!l.length) return msg('불가', '내용 없음'); 
  
  $('pdfModal').classList.remove('hidden'); 
  $('pdfModal').classList.add('flex'); 
  
  if (!state.isPreview) {
    state.isPreview = true;
    render();
  }
  
  for (let i = 0; i < l.length; i++) { 
    $('pdfTxt').textContent = `개별 PDF 저장 중... (${i + 1}/${l.length})\n- ${l[i].title}`; 
    await genPdf(l[i].title, l[i].content, `${state.prefix ? state.prefix + '-' : ''}${l[i].title}.pdf`); 
    await new Promise(r => setTimeout(r, 500)); 
  } 
  $('pdfModal').classList.add('hidden'); 
};

// 단축키 매핑 (Ctrl + Alt + Left / Right)
window.addEventListener('keydown', e => { 
  if (e.ctrlKey && e.altKey && (e.key === 'ArrowLeft' || e.key === 'ArrowRight')) { 
    e.preventDefault(); 
    const i = state.tabs.findIndex(t => t.id === state.activeId); 
    if (i === -1) return; 
    state.activeId = e.key === 'ArrowLeft' ? state.tabs[(i - 1 + state.tabs.length) % state.tabs.length].id : state.tabs[(i + 1) % state.tabs.length].id; 
    render(); 
  } 
});

// 진입 시 렌더링 엔진 시작
render();
</script>
</body>
</html>
